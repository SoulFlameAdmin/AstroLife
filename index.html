<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soulflame Delivery</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --line: rgba(0,0,0,.08);
      --shadow: 0 20px 60px rgba(0,0,0,.08);
      --shadow-hover: 0 28px 80px rgba(0,0,0,.14);
      --radius: 26px;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
      opacity: .18;
    }

    body::before {
      width: 320px;
      height: 320px;
      top: -80px;
      left: -80px;
      background: #dbeafe;
      animation: driftA 10s ease-in-out infinite;
    }

    body::after {
      width: 360px;
      height: 360px;
      right: -120px;
      bottom: -100px;
      background: #fde68a;
      animation: driftB 12s ease-in-out infinite;
    }

    @keyframes driftA {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(40px,25px) scale(1.08); }
    }

    @keyframes driftB {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(-30px,-20px) scale(1.06); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 1.6vw, 18px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .logo-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      width: 100%;
      min-height: 250px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease;
      animation: floatCard 4.5s ease-in-out infinite;
      overflow: hidden;
    }

    .logo-btn:nth-child(2) { animation-delay: .4s; }
    .logo-btn:nth-child(3) { animation-delay: .8s; }
    .logo-btn:nth-child(4) { animation-delay: 1.2s; }

    .logo-btn:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0,0,0,.14);
    }

    .logo-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.75), rgba(255,255,255,0));
      pointer-events: none;
    }

    @keyframes floatCard {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .logo-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f6f7f9;
      border: 1px solid rgba(0,0,0,.06);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .open-icon {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-box {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 120px;
      border-radius: 18px;
      background: #ffffff;
      padding: 18px;
    }

    .logo-box img {
      max-width: 100%;
      max-height: 90px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.08));
    }

    .meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .meta p {
      display: none;
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 20px, 1200px);
        padding: 28px 0 40px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .logo-btn {
        min-height: 220px;
        padding: 18px;
      }

      .meta h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Soulflame Delivery</h1>
      <p>Показани са само магазините, които имаме в момента.</p>
    </div>

    <div class="grid" id="logoGrid"></div>
  </div>

  <script>
    const items = [
      {
        name: "Mini Mart",
        tag: "Store",
        image: "https://media.licdn.com/dms/image/v2/D4D0BAQG5EnvRK77NhQ/company-logo_200_200/company-logo_200_200/0/1704370893024/minimart_bgc_convenience_stores_logo?e=2147483647&v=beta&t=OIw6PPBNoA_-FgQiQ2YbainVEYdoCZllRSj5TjNgrII",
        link: "./minimart_delivery/index.html"
      },
      {
        name: "Kaufland",
        tag: "Market",
        image: "https://images.seeklogo.com/logo-png/31/1/kaufland-logo-png_seeklogo-314854.png",
        link: "./kaufland_delivery/dostavka.bg.bg/index.html"
      },
      {
        name: "Masterhaus",
        tag: "Home",
        image: "https://www.masterhaus.bg/images/default-og-image.jpg?m=1696323554",
        link: "./masterhouse_delivery/index.html"
      },
      {
        name: "Billa",
        tag: "Retail",
        image: "https://images.seeklogo.com/logo-png/17/1/billa-logo-png_seeklogo-172584.png",
        link: "./billa_delivery/index.html"
      }
    ];

    const grid = document.getElementById("logoGrid");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function openPage(url) {
      window.location.href = url;
    }

    function renderCards() {
      grid.innerHTML = items.map(item => {
        const safeName = escapeHtml(item.name);
        const safeTag = escapeHtml(item.tag);
        const safeImage = escapeHtml(item.image);
        const safeLink = escapeHtml(item.link);

        return `
          <button class="logo-btn" type="button" aria-label="${safeName}" data-link="${safeLink}">
            <div class="logo-top">
              <span class="chip">${safeTag}</span>
              <span class="open-icon" aria-hidden="true">↗</span>
            </div>

            <div class="logo-box">
              <img src="${safeImage}" alt="${safeName} logo" loading="lazy" referrerpolicy="no-referrer" />
            </div>

            <div class="meta">
              <h2>${safeName}</h2>
            </div>
          </button>
        `;
      }).join("");
    }

    renderCards();

    grid.addEventListener("click", (event) => {
      const card = event.target.closest(".logo-btn");
      if (!card) return;
      openPage(card.dataset.link);
    });
  </script>
</body>
</html>
