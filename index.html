<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MiniMart</title>
  <meta name="description" content="MiniMart index с един box и logo-style визия." />
  <meta name="theme-color" content="#f7f8fc" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--text:#0f172a;--muted:#64748b;--line:rgba(15,23,42,.10);--brand:#4338ca;--brand2:#06b6d4;--shadow:0 24px 70px rgba(15,23,42,.12)}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:linear-gradient(180deg,#fbfcff 0%,#f3f6fb 100%);overflow:hidden}
    .blur{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}.b1{width:320px;height:320px;background:rgba(67,56,202,.10);top:-120px;left:-80px}.b2{width:340px;height:340px;background:rgba(6,182,212,.10);right:-100px;top:120px}
    .hero{min-height:100%;display:grid;place-items:center;padding:20px;position:relative}.hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.56)),url('https://picsum.photos/id/1011/1800/1200');background-size:cover;background-position:center;background-attachment:fixed;transform:scale(1.04)}
    .box{position:relative;z-index:1;width:min(560px,100%);padding:34px;border-radius:34px;background:rgba(255,255,255,.78);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.88);box-shadow:var(--shadow);text-align:center}
    .eyebrow{display:inline-flex;align-items:center;min-height:34px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.92);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}
    .logo{display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:18px}.logoMark{width:104px;height:104px;border-radius:28px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:#fff;font-size:48px;font-weight:900;box-shadow:var(--shadow)}.logoWord strong{display:block;font-size:42px;letter-spacing:-.05em}.logoWord span{display:block;margin-top:6px;color:var(--muted);font-size:13px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
    h1{margin:18px 0 10px;font-size:clamp(34px,6vw,56px);line-height:.95;letter-spacing:-.05em}.subtitle{margin:0 auto;max-width:430px;color:var(--muted);line-height:1.75}
    .actions{display:flex;flex-direction:column;gap:12px;margin-top:24px}.btn,.ghost{min-height:54px;padding:0 18px;border-radius:16px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-weight:800;text-decoration:none;transition:.22s}.btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:var(--shadow)}.ghost{background:rgba(255,255,255,.82);border:1px solid var(--line);color:var(--text)}.btn:hover,.ghost:hover{transform:translateY(-2px)}
    @media (max-width:640px){body{overflow:auto}.hero::before{background-attachment:scroll}.box{padding:24px;border-radius:28px}.logoMark{width:88px;height:88px;font-size:42px}.logoWord strong{font-size:34px}}
  </style>
</head>
<body>
  <div class="blur b1"></div>
  <div class="blur b2"></div>
  <main class="hero">
    <section class="box">
      <div class="eyebrow">MiniMart</div>
      <div class="logo">
        <div class="logoMark">M</div>
        <div class="logoWord">
          <strong>MiniMart</strong>
          <span>smart catalog</span>
        </div>
      </div>
      <h1>Един box.<br>Едно лого.<br>MiniMart.</h1>
      <p class="subtitle">Чист начален index с един централен MiniMart box. Оттук отваряш каталога или MiniMart box страницата.</p>
      <div class="actions">
        <a class="btn" href="/minimart-box.html">Отвори MiniMart каталог</a>
        <a class="ghost" href="/admin">Admin</a>
      </div>
    </section>
  </main>
</body>
</html>
