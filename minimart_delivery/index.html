<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Mart Delivery</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f4f8f2;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --green:#8cc63f;
      --green-dark:#5e8f1d;
      --line:rgba(15,23,42,0.08);
      --shadow:0 18px 46px rgba(9,15,24,.08);
      --dark:#0b2230;
    }

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#fbfff8,#eef5e9);
      color:var(--text);
      font-family:Arial,sans-serif;
    }

    .page{
      max-width:1720px;
      margin:0 auto;
      padding:0 18px 24px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:60;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      margin:0 -18px 18px;
      padding:14px 18px;
      box-shadow:0 8px 24px rgba(0,0,0,.03);
    }

    .topbar-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      max-width:1720px;
      margin:0 auto;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .brand img{
      width:160px;
      max-width:100%;
      display:block;
    }

    .brand-copy h1{
      margin:0 0 4px;
      font-size:22px;
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .brand-copy p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .search{
      width:390px;
      max-width:100%;
      height:54px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:0 20px;
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .cart-btn{
      min-width:138px;
      height:54px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,var(--green),#78b727);
      color:#fff;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      padding:0 20px;
      box-shadow:0 14px 28px rgba(140,198,63,.22);
    }

    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin:12px 0 14px;
    }

    .pill{
      border:none;
      background:#fff;
      color:var(--text);
      height:54px;
      padding:0 22px;
      border-radius:999px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .pill.active{
      background:#07222a;
      color:#fff;
      border-color:#07222a;
    }

    .head-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:12px 0 16px;
      flex-wrap:wrap;
    }

    .head-row h2{
      margin:0;
      font-size:54px;
      line-height:.95;
      letter-spacing:-.05em;
    }

    .results{
      color:var(--muted);
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .image-wrap{
      aspect-ratio:1/1;
      overflow:hidden;
      background:#fff;
      position:relative;
    }

    .image-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#fff;
    }

    .badge{
      position:absolute;
      top:16px;
      left:16px;
      z-index:2;
      background:rgba(255,255,255,.93);
      color:#111;
      padding:10px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:900;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }

    .source-badge{
      position:absolute;
      top:16px;
      right:16px;
      z-index:2;
      background:rgba(7,34,42,.92);
      color:#fff;
      padding:8px 12px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .body{
      padding:20px 18px 18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .title{
      font-size:28px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .desc{
      color:#55687b;
      font-size:15px;
      line-height:1.5;
      min-height:44px;
    }

    .price{
      font-size:28px;
      font-weight:900;
      letter-spacing:-.03em;
      margin-top:6px;
    }

    .subprice{
      color:#55687b;
      font-size:13px;
      font-weight:800;
    }

    .meta-box{
      margin-top:2px;
      padding:14px 16px;
      background:#f7faf7;
      border:1px solid rgba(15,23,42,0.08);
      border-radius:18px;
      color:#55687b;
      font-size:13px;
      line-height:1.5;
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:auto;
      padding-top:4px;
      flex-wrap:wrap;
    }

    .mini-btn{
      flex:1;
      min-width:130px;
      height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
    }

    .mini-btn.dark{
      background:#081e2a;
      color:#fff;
      border-color:#081e2a;
    }

    .empty{
      display:none;
      padding:18px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      color:var(--muted);
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    @media (max-width:900px){
      .head-row h2{ font-size:42px; }
      .grid{ grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); }
    }

    @media (max-width:720px){
      .page{ padding:0 14px 20px; }
      .topbar{ margin:0 -14px 16px; padding:12px 14px; }
      .topbar-inner{ align-items:flex-start; }
      .search{ width:100%; }
      .top-actions{ width:100%; }
      .cart-btn{ width:100%; }
      .head-row h2{ font-size:34px; }
      .grid{ grid-template-columns:1fr; gap:16px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="https://mini-mart.bg/wp-content/uploads/2023/08/logo-copy.png" alt="Mini Mart Logo">
          <div class="brand-copy">
            <h1>Mini Mart Delivery</h1>
            <p>Единен каталог + количка + точни direct URL изображения, където са потвърдени</p>
          </div>
        </div>

        <div class="top-actions">
          <input id="searchInput" class="search" type="text" placeholder="Търси продукт..." />
          <button id="cartOpenBtn" class="cart-btn">Количка (0)</button>
        </div>
      </div>
    </header>

    <section class="filters">
      <button class="pill active" data-filter="all">Всички</button>
      <button class="pill" data-filter="Хотдог">Хотдог</button>
      <button class="pill" data-filter="Сандвичи">Сандвичи</button>
      <button class="pill" data-filter="Напитки">Напитки</button>
      <button class="pill" data-filter="Комбо">Комбо</button>
      <button class="pill" data-filter="Закуски">Закуски</button>
      <button class="pill" data-filter="Десерти">Десерти</button>
      <button class="pill" data-filter="Алкохол">Алкохол</button>
      <button class="pill" data-filter="Основни храни">Основни храни</button>
      <button class="pill" data-filter="Консерви">Консерви</button>
      <button class="pill" data-filter="Нехранителни">Нехранителни</button>
    </section>

    <div class="head-row">
      <h2>Продукти</h2>
      <div class="results" id="resultsText">Показани 0 продукта</div>
    </div>

    <div id="emptyState" class="empty">Няма продукти по това търсене.</div>
    <section id="productGrid" class="grid"></section>
  </div>

  <script>
    const CART_KEY = "minimart_real_images_cart_v4";

    function usgImg(code) {
      return `https://usg.bg/cdn-cgi/imagedelivery/ObffgCV-C0AAn5AgP1N3FA/0_${code}_1/public`;
    }

    function svgFallback(text) {
      const safe = String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

      return `data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 900'>
        <defs>
          <linearGradient id='g' x1='0' x2='1' y1='0' y2='1'>
            <stop offset='0%' stop-color='%23c7ee92'/>
            <stop offset='100%' stop-color='%238cc63f'/>
          </linearGradient>
        </defs>
        <rect width='900' height='900' fill='url(%23g)'/>
        <rect x='30' y='30' width='840' height='840' rx='42' fill='none' stroke='%23ffffff' stroke-width='7' opacity='0.85'/>
        <text x='50%' y='42%' font-family='Arial' font-size='62' font-weight='900' text-anchor='middle' fill='%230d2f16'>Mini Mart</text>
        <text x='50%' y='53%' font-family='Arial' font-size='28' font-weight='800' text-anchor='middle' fill='%230d2f16'>${encodeURIComponent(safe)}</text>
      </svg>`.replace(/\n/g,'');
    }

    const directImages = {
      "Един Рап цезар": "https://mini-mart.bg/wp-content/uploads/2025/06/Minimart_March_toastrap_01.png",
      "Един Рап с шунка": "https://mini-mart.bg/wp-content/uploads/2025/06/Minimart_March_toastrap_02.png",
      "Един Тост шунка": "https://mini-mart.bg/wp-content/uploads/2025/06/Minimart_March_toastrap_03.png",
      "Хотдог Classic": "https://mini-mart.bg/wp-content/uploads/2025/09/01-Classic.png",
      "Хотдог Multigrain": "https://mini-mart.bg/wp-content/uploads/2025/09/02-Multigrain.png",
      "Хотдог Gymbo": "https://mini-mart.bg/wp-content/uploads/2025/09/03-Gymbo.png",
      "Хотдог New York": "https://mini-mart.bg/wp-content/uploads/2026/02/04-New-York-New-1.png",
      "Хотдог Paris": "https://mini-mart.bg/wp-content/uploads/2025/09/05-Paris.png",
      "Хотдог Tokyo": "https://mini-mart.bg/wp-content/uploads/2025/09/07-Tokyo-NEW.png",

      "Devin 500 ml": "https://usg.bg/cdn-cgi/imagedelivery/ObffgCV-C0AAn5AgP1N3FA/0_5015200130_1/public",
      "Десерт Kit Kat": usgImg("5110120182"),
      "Бира Heineken": usgImg("5015260099"),
      "Coca-Cola 2 l": usgImg("5015180145")
    };

    const products = [
      { title: "Хотдог Tokyo", category: "Хотдог", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Хотдог New York", category: "Хотдог", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Хотдог Paris", category: "Хотдог", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Хотдог Classic", category: "Хотдог", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Хотдог Multigrain", category: "Хотдог", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Хотдог Gymbo", category: "Хотдог", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },

      { title: "Клуб сандвич", category: "Сандвичи", desc: "Клуб сандвич.", priceLabel: "Цена по обект" },
      { title: "Един Рап цезар", category: "Сандвичи", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Един Рап с шунка", category: "Сандвичи", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },
      { title: "Един Тост шунка", category: "Сандвичи", desc: "Official Mini Mart image.", priceLabel: "Цена по обект" },

      { title: "Газирана напитка Pepsi 2 л", category: "Напитки", desc: "Pepsi 2 l.", priceLabel: "Цена по обект" },
      { title: "Плодова напитка Queen 1 л", category: "Напитки", desc: "Плодова напитка 1 l.", priceLabel: "Цена по обект" },
      { title: "Devin 500 ml", category: "Напитки", desc: "Минерална вода 500 ml.", priceLabel: "Цена по обект" },

      { title: "Кейк Milkiss + вода Devin", category: "Комбо", desc: "Кейк + вода.", priceLabel: "Цена по обект" },
      { title: "Солети Elephant + Vitamin Aqua", category: "Комбо", desc: "Солети + вода.", priceLabel: "Цена по обект" },
      { title: "Пица Passionata + Coca-Cola", category: "Комбо", desc: "Пица + Coca-Cola.", priceLabel: "Цена по обект" },

      { title: "Зърнена закуска Nesquik + Верея прясно мляко", category: "Закуски", desc: "Комбо закуска.", priceLabel: "Цена по обект" },
      { title: "Брускети Maretti", category: "Закуски", desc: "Брускети.", priceLabel: "Цена по обект" },
      { title: "Протеинов бар Fit Spo", category: "Закуски", desc: "Протеинов бар.", priceLabel: "Цена по обект" },
      { title: "Крекери Croco", category: "Закуски", desc: "Крекери.", priceLabel: "Цена по обект" },
      { title: "Чипс Pringles", category: "Закуски", desc: "Чипс.", priceLabel: "Цена по обект" },
      { title: "Снакс Hula Hoops", category: "Закуски", desc: "Снакс.", priceLabel: "Цена по обект" },
      { title: "BIO Harmonica вафла", category: "Закуски", desc: "Био вафла.", priceLabel: "Цена по обект" },
      { title: "Кроасан с пушено филе и айсберг", category: "Закуски", desc: "Кроасан.", priceLabel: "Цена по обект" },

      { title: "Десерт Kit Kat", category: "Десерти", desc: "Kit Kat 4 Finger.", priceLabel: "Цена по обект" },
      { title: "Шоколадови бонбони Toffifee", category: "Десерти", desc: "Шоколадови бонбони.", priceLabel: "Цена по обект" },
      { title: "Десерт Serenata", category: "Десерти", desc: "Шоколадов десерт.", priceLabel: "Цена по обект" },
      { title: "Тунквани бисквити Coffee", category: "Десерти", desc: "Бисквити.", priceLabel: "Цена по обект" },
      { title: "Сладолед Familia", category: "Десерти", desc: "Сладолед.", priceLabel: "Цена по обект" },

      { title: "Бира Heineken", category: "Алкохол", desc: "Heineken.", priceLabel: "Цена по обект" },
      { title: "Бира Бургаско", category: "Алкохол", desc: "Бира.", priceLabel: "Цена по обект" },
      { title: "Alaska Pure Grain Vodka", category: "Алкохол", desc: "Водка.", priceLabel: "Цена по обект" },
      { title: "Уиски Bushmills Black", category: "Алкохол", desc: "Уиски.", priceLabel: "Цена по обект" },
      { title: "Jameson ирландско уиски", category: "Алкохол", desc: "Ирландско уиски.", priceLabel: "Цена по обект" },
      { title: "Вино ВИА ВИНЕРА", category: "Алкохол", desc: "Вино.", priceLabel: "Цена по обект" },

      { title: "Krina ориз бял 1 кг", category: "Основни храни", desc: "Ориз 1 кг.", priceLabel: "Цена по обект" },
      { title: "Дерони домашна едросмляна лютеница", category: "Основни храни", desc: "Лютеница.", priceLabel: "Цена по обект" },
      { title: "Захар Сладея 1 кг", category: "Основни храни", desc: "Захар 1 кг.", priceLabel: "Цена по обект" },

      { title: "Compass риба тон филе", category: "Консерви", desc: "Риба тон.", priceLabel: "Цена по обект" },
      { title: "Грах Bonduelle", category: "Консерви", desc: "Грах.", priceLabel: "Цена по обект" },

      { title: "Паста за зъби Aquafresh", category: "Нехранителни", desc: "Паста за зъби.", priceLabel: "Цена по обект" }
    ];

    let currentFilter = "all";

    const categoryPriority = {
      "Хотдог": 1,
      "Сандвичи": 2,
      "Напитки": 3,
      "Комбо": 4,
      "Закуски": 5,
      "Десерти": 6,
      "Алкохол": 7,
      "Основни храни": 8,
      "Консерви": 9,
      "Нехранителни": 10
    };

    const els = {
      searchInput: document.getElementById("searchInput"),
      cartOpenBtn: document.getElementById("cartOpenBtn"),
      productGrid: document.getElementById("productGrid"),
      emptyState: document.getElementById("emptyState"),
      resultsText: document.getElementById("resultsText"),
      pills: [...document.querySelectorAll(".pill")]
    };

    function getImageFor(product) {
      if (directImages[product.title]) {
        return { url: directImages[product.title], source: "Direct" };
      }
      return { url: svgFallback(product.title), source: "Pending" };
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem(CART_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateCartUi();
    }

    function addToCart(title) {
      const cart = getCart();
      const found = cart.find(x => x.title === title);

      if (found) {
        found.qty += 1;
      } else {
        cart.push({ title, qty: 1 });
      }

      saveCart(cart);
    }

    function clearCart() {
      localStorage.removeItem(CART_KEY);
      updateCartUi();
    }

    function updateCartUi() {
      const count = getCart().reduce((sum, item) => sum + item.qty, 0);
      els.cartOpenBtn.textContent = `Количка (${count})`;
    }

    function showCart() {
      const cart = getCart();

      if (!cart.length) {
        alert("Количката е празна.");
        return;
      }

      const text = cart.map(item => `• ${item.title} x${item.qty}`).join("\n");
      const shouldClear = confirm(`Количка:\n\n${text}\n\nOK = Изчисти количката\nCancel = Затвори`);
      if (shouldClear) clearCart();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function matchesProduct(product) {
      const q = els.searchInput.value.trim().toLowerCase();
      const filterOk = currentFilter === "all" || product.category === currentFilter;
      const text = `${product.title} ${product.category} ${product.desc}`.toLowerCase();
      const searchOk = !q || text.includes(q);
      return filterOk && searchOk;
    }

    function sortProducts(list) {
      if (currentFilter !== "all") return list;

      return [...list].sort((a, b) => {
        const priorityA = categoryPriority[a.category] || 999;
        const priorityB = categoryPriority[b.category] || 999;

        if (priorityA !== priorityB) {
          return priorityA - priorityB;
        }

        return a.title.localeCompare(b.title, "bg");
      });
    }

    function renderProducts() {
      const filtered = sortProducts(products.filter(matchesProduct));

      els.productGrid.innerHTML = "";
      els.resultsText.textContent = `Показани ${filtered.length} продукта`;
      els.emptyState.style.display = filtered.length ? "none" : "block";

      const frag = document.createDocumentFragment();

      filtered.forEach((product) => {
        const imageData = getImageFor(product);
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div class="image-wrap">
            <div class="badge">${escapeHtml(product.category)}</div>
            <div class="source-badge">${escapeHtml(imageData.source)}</div>
            <img src="${imageData.url}" alt="${escapeHtml(product.title)}" loading="lazy">
          </div>
          <div class="body">
            <div class="title">${escapeHtml(product.title)}</div>
            <div class="desc">${escapeHtml(product.desc)}</div>
            <div class="price">${escapeHtml(product.priceLabel)}</div>
            <div class="subprice">при „Всички“ започва с hotdog</div>
            <div class="meta-box">
              Ако има потвърден direct URL, се зарежда той.<br>
              Ако още не е вързан exact линк, показва отделна карта с името на продукта, не чужда снимка.
            </div>
            <div class="actions">
              <button class="mini-btn dark">Добави в количката</button>
              <button class="mini-btn">Виж снимка</button>
            </div>
          </div>
        `;

        const img = card.querySelector("img");
        const addBtn = card.querySelectorAll(".mini-btn")[0];
        const viewBtn = card.querySelectorAll(".mini-btn")[1];

        img.addEventListener("error", () => {
          img.src = svgFallback(product.title);
        });

        addBtn.addEventListener("click", () => addToCart(product.title));
        viewBtn.addEventListener("click", () => window.open(imageData.url, "_blank"));

        frag.appendChild(card);
      });

      els.productGrid.appendChild(frag);
    }

    els.searchInput.addEventListener("input", renderProducts);
    els.cartOpenBtn.addEventListener("click", showCart);

    els.pills.forEach(btn => {
      btn.addEventListener("click", () => {
        els.pills.forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderProducts();
      });
    });

    renderProducts();
    updateCartUi();
  </script>
</body>
</html>
