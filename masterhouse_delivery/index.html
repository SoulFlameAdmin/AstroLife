<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Mart Catalog</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f6f9f3;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,0.08);
      --shadow:0 18px 46px rgba(9,15,24,.08);
      --green:#8cc63f;
      --green-dark:#5e8f1d;
      --dark:#0f172a;
      --soft:#eef5e8;
      --accent:#1f2937;
    }

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#fbfff8,#f2f8ee);
      color:var(--text);
      font-family:Arial,sans-serif;
    }

    .page{
      max-width:1440px;
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:24px;
      padding:14px 16px;
      box-shadow:var(--shadow);
      position:sticky;
      top:10px;
      z-index:50;
      backdrop-filter:blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand img{
      width:132px;
      max-width:100%;
      display:block;
    }

    .brand-text{
      min-width:0;
    }

    .brand-text h1{
      margin:0 0 4px;
      font-size:clamp(22px,3vw,34px);
      line-height:1;
      letter-spacing:-0.04em;
    }

    .brand-text p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .control{
      height:46px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:0 14px;
      font-size:14px;
      outline:none;
      min-width:220px;
    }

    .button{
      height:46px;
      border:none;
      border-radius:14px;
      padding:0 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      text-decoration:none;
      transition:transform .18s ease, opacity .18s ease;
    }

    .button:hover{ transform:translateY(-1px); }

    .button.primary{
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:#fff;
      box-shadow:0 14px 30px rgba(140,198,63,.24);
    }

    .button.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .stat{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .stat .label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:8px;
    }

    .stat .value{
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .image-wrap{
      aspect-ratio:1/1;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border-bottom:1px solid var(--line);
      position:relative;
    }

    .image-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .source-badge{
      position:absolute;
      top:12px;
      left:12px;
      background:rgba(255,255,255,.92);
      color:#111;
      border-radius:999px;
      padding:8px 11px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.04em;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .body{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1;
    }

    .tag{
      display:inline-flex;
      width:max-content;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(140,198,63,.14);
      color:var(--green-dark);
      font-size:11px;
      font-weight:800;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .title{
      font-size:16px;
      line-height:1.38;
      font-weight:800;
      min-height:44px;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .price{
      display:flex;
      align-items:baseline;
      gap:8px;
      flex-wrap:wrap;
      margin-top:2px;
    }

    .bgn{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .hint{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .actions{
      margin-top:auto;
      display:flex;
      gap:8px;
      padding-top:6px;
      flex-wrap:wrap;
    }

    .mini-btn{
      flex:1;
      min-width:120px;
      height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .mini-btn.dark{
      background:var(--dark);
      color:#fff;
      border-color:var(--dark);
    }

    .cart-panel{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:80;
      background:#111827;
      color:#fff;
      border-radius:20px;
      padding:14px 16px;
      box-shadow:0 20px 50px rgba(0,0,0,.22);
      min-width:240px;
    }

    .cart-panel .small{
      font-size:12px;
      opacity:.78;
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .cart-panel .big{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
      margin-bottom:10px;
    }

    .cart-panel .row{
      display:flex;
      gap:8px;
    }

    .cart-panel button{
      flex:1;
      height:38px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
    }

    .cart-panel .light{
      background:#fff;
      color:#111827;
    }

    .cart-panel .green{
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:#fff;
    }

    .empty{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      color:var(--muted);
      line-height:1.6;
      box-shadow:var(--shadow);
      display:none;
    }

    @media (max-width:980px){
      .stats{ grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width:720px){
      .page{ padding:14px; }
      .topbar{ position:static; }
      .top-actions{ width:100%; }
      .control{ min-width:100%; width:100%; }
      .button{ flex:1; }
      .stats{ grid-template-columns:1fr; }
      .cart-panel{
        right:12px;
        left:12px;
        bottom:12px;
        min-width:auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="topbar">
      <div class="brand">
        <img src="https://mini-mart.bg/wp-content/uploads/2023/08/logo-copy.png" alt="Mini Mart Logo">
        <div class="brand-text">
          <h1>Mini Mart каталог</h1>
          <p>Точни official снимки за наличните standalone меню артикули + чист fallback за останалите</p>
        </div>
      </div>

      <div class="top-actions">
        <input id="searchInput" class="control" type="text" placeholder="Търси продукт..." />
        <button class="button secondary" id="resetBtn">Изчисти</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="label">Общо продукти</div>
        <div class="value" id="totalProducts">0</div>
      </div>
      <div class="stat">
        <div class="label">Показани</div>
        <div class="value" id="shownProducts">0</div>
      </div>
      <div class="stat">
        <div class="label">В количката</div>
        <div class="value" id="cartCount">0</div>
      </div>
      <div class="stat">
        <div class="label">Категории</div>
        <div class="value" id="totalCategories">0</div>
      </div>
    </section>

    <div id="emptyState" class="empty">Няма продукти по това търсене.</div>

    <section id="productGrid" class="grid"></section>
  </div>

  <div class="cart-panel">
    <div class="small">Mini Mart количка</div>
    <div class="big" id="floatingCartCount">0 продукта</div>
    <div class="row">
      <button class="light" id="clearCartBtn">Изчисти</button>
      <button class="green" id="viewCartBtn">Виж количка</button>
    </div>
  </div>

  <script>
    const CART_KEY = "minimart_cart_boxes_v2";

    function makePlaceholder(text) {
      const safe = escapeXml(text);
      return `data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 800'>
  <defs>
    <linearGradient id='g' x1='0' x2='1' y1='0' y2='1'>
      <stop offset='0%' stop-color='%23c8ef8d'/>
      <stop offset='100%' stop-color='%238cc63f'/>
    </linearGradient>
  </defs>
  <rect width='800' height='800' fill='url(%23g)'/>
  <rect x='28' y='28' width='744' height='744' rx='36' fill='none' stroke='%23ffffff' stroke-width='6' opacity='0.85'/>
  <text x='50%' y='42%' font-family='Arial' font-size='56' font-weight='800' text-anchor='middle' fill='%230f2e15'>Mini Mart</text>
  <text x='50%' y='52%' font-family='Arial' font-size='30' font-weight='700' text-anchor='middle' fill='%230f2e15'>${encodeURIComponent(safe)}</text>
</svg>`.replace(/\n/g, "");
    }

    function escapeXml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    const exactImages = {
      "Един Рап цезар": "https://mini-mart.bg/wp-content/uploads/2025/06/Minimart_March_toastrap_01.png",
      "Един Рап с шунка": "https://mini-mart.bg/wp-content/uploads/2025/06/Minimart_March_toastrap_02.png",
      "Един Тост шунка": "https://mini-mart.bg/wp-content/uploads/2025/06/Minimart_March_toastrap_03.png",

      "Хотдог Classic": "https://mini-mart.bg/wp-content/uploads/2025/09/01-Classic.png",
      "Хотдог Multigrain": "https://mini-mart.bg/wp-content/uploads/2025/09/02-Multigrain.png",
      "Хотдог Gymbo": "https://mini-mart.bg/wp-content/uploads/2025/09/03-Gymbo.png",
      "Хотдог New York": "https://mini-mart.bg/wp-content/uploads/2026/02/04-New-York-New-1.png",
      "Хотдог Paris": "https://mini-mart.bg/wp-content/uploads/2025/09/05-Paris.png",
      "Хотдог Tokyo": "https://mini-mart.bg/wp-content/uploads/2025/09/07-Tokyo-NEW.png"
    };

    const products = [
      { title: "Зърнена закуска Nesquik + Верея прясно мляко", category: "Закуски", priceLabel: "Цена по обект" },
      { title: "Кейк Milkiss + вода Devin", category: "Комбо", priceLabel: "Цена по обект" },
      { title: "Солети Elephant + Vitamin Aqua", category: "Комбо", priceLabel: "Цена по обект" },
      { title: "Десерт Kit Kat", category: "Десерти", priceLabel: "Цена по обект" },
      { title: "Брускети Maretti", category: "Снаксове", priceLabel: "Цена по обект" },
      { title: "Шоколадови бонбони Toffifee", category: "Сладки", priceLabel: "Цена по обект" },
      { title: "Протеинов бар Fit Spo", category: "Барове", priceLabel: "Цена по обект" },
      { title: "Десерт Serenata", category: "Десерти", priceLabel: "Цена по обект" },
      { title: "Тунквани бисквити Coffee", category: "Бисквити", priceLabel: "Цена по обект" },
      { title: "Крекери Croco", category: "Снаксове", priceLabel: "Цена по обект" },
      { title: "Чипс Pringles", category: "Чипс", priceLabel: "Цена по обект" },
      { title: "Снакс Hula Hoops", category: "Снаксове", priceLabel: "Цена по обект" },
      { title: "BIO Harmonica вафла", category: "BIO", priceLabel: "Цена по обект" },
      { title: "Сладолед Familia", category: "Сладоледи", priceLabel: "Цена по обект" },
      { title: "Бира Heineken", category: "Напитки", priceLabel: "Цена по обект" },
      { title: "Бира Бургаско", category: "Напитки", priceLabel: "Цена по обект" },
      { title: "Газирана напитка Pepsi 2 л", category: "Напитки", priceLabel: "Цена по обект" },
      { title: "Плодова напитка Queen 1 л", category: "Напитки", priceLabel: "Цена по обект" },
      { title: "Вода Devin 425 мл", category: "Напитки", priceLabel: "Цена по обект" },
      { title: "Alaska Pure Grain Vodka", category: "Алкохол", priceLabel: "Цена по обект" },
      { title: "Уиски Bushmills Black", category: "Алкохол", priceLabel: "Цена по обект" },
      { title: "Jameson ирландско уиски", category: "Алкохол", priceLabel: "Цена по обект" },
      { title: "Вино ВИА ВИНЕРА", category: "Алкохол", priceLabel: "Цена по обект" },
      { title: "Compass риба тон филе", category: "Консерви", priceLabel: "Цена по обект" },
      { title: "Krina ориз бял 1 кг", category: "Основни храни", priceLabel: "Цена по обект" },
      { title: "Дерони домашна едросмляна лютеница", category: "Основни храни", priceLabel: "Цена по обект" },
      { title: "Грах Bonduelle", category: "Консерви", priceLabel: "Цена по обект" },
      { title: "Паста за зъби Aquafresh", category: "Нехранителни", priceLabel: "Цена по обект" },
      { title: "Захар Сладея 1 кг", category: "Основни храни", priceLabel: "Цена по обект" },
      { title: "Пица Passionata + Coca-Cola", category: "Комбо", priceLabel: "Цена по обект" },
      { title: "Клуб сандвич", category: "Сандвичи", priceLabel: "Цена по обект" },
      { title: "Хотдог Tokyo", category: "Хотдог", priceLabel: "Цена по обект" },
      { title: "Хотдог New York", category: "Хотдог", priceLabel: "Цена по обект" },
      { title: "Хотдог Paris", category: "Хотдог", priceLabel: "Цена по обект" },
      { title: "Кроасан с пушено филе и айсберг", category: "Закуски", priceLabel: "Цена по обект" },

      { title: "Един Рап цезар", category: "Сандвичи", priceLabel: "Цена по обект" },
      { title: "Един Рап с шунка", category: "Сандвичи", priceLabel: "Цена по обект" },
      { title: "Един Тост шунка", category: "Сандвичи", priceLabel: "Цена по обект" },
      { title: "Хотдог Classic", category: "Хотдог", priceLabel: "Цена по обект" },
      { title: "Хотдог Multigrain", category: "Хотдог", priceLabel: "Цена по обект" },
      { title: "Хотдог Gymbo", category: "Хотдог", priceLabel: "Цена по обект" }
    ];

    const els = {
      searchInput: document.getElementById("searchInput"),
      resetBtn: document.getElementById("resetBtn"),
      totalProducts: document.getElementById("totalProducts"),
      shownProducts: document.getElementById("shownProducts"),
      totalCategories: document.getElementById("totalCategories"),
      cartCount: document.getElementById("cartCount"),
      floatingCartCount: document.getElementById("floatingCartCount"),
      productGrid: document.getElementById("productGrid"),
      emptyState: document.getElementById("emptyState"),
      clearCartBtn: document.getElementById("clearCartBtn"),
      viewCartBtn: document.getElementById("viewCartBtn")
    };

    function getImageForProduct(product) {
      if (exactImages[product.title]) {
        return {
          url: exactImages[product.title],
          source: "Official"
        };
      }

      return {
        url: makePlaceholder(product.title),
        source: "Fallback"
      };
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem(CART_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateCartUI();
    }

    function addToCart(productTitle) {
      const cart = getCart();
      const found = cart.find(x => x.title === productTitle);

      if (found) {
        found.qty += 1;
      } else {
        cart.push({ title: productTitle, qty: 1 });
      }

      saveCart(cart);
    }

    function clearCart() {
      localStorage.removeItem(CART_KEY);
      updateCartUI();
    }

    function updateCartUI() {
      const cart = getCart();
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      els.cartCount.textContent = count;
      els.floatingCartCount.textContent = `${count} продукта`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderProducts() {
      const q = els.searchInput.value.trim().toLowerCase();

      const filtered = products.filter(product => {
        const text = `${product.title} ${product.category}`.toLowerCase();
        return !q || text.includes(q);
      });

      els.productGrid.innerHTML = "";
      els.totalProducts.textContent = products.length;
      els.shownProducts.textContent = filtered.length;
      els.totalCategories.textContent = new Set(products.map(p => p.category)).size;

      if (!filtered.length) {
        els.emptyState.style.display = "block";
        return;
      }

      els.emptyState.style.display = "none";

      const frag = document.createDocumentFragment();

      filtered.forEach((product, index) => {
        const card = document.createElement("article");
        card.className = "card";

        const imageData = getImageForProduct(product);

        card.innerHTML = `
          <div class="image-wrap">
            <span class="source-badge">${escapeHtml(imageData.source)}</span>
            <img src="${imageData.url}" alt="${escapeHtml(product.title)}" loading="lazy">
          </div>
          <div class="body">
            <div class="tag">${escapeHtml(product.category)}</div>
            <div class="title">${escapeHtml(product.title)}</div>
            <div class="price">
              <div class="bgn">${escapeHtml(product.priceLabel)}</div>
              <div class="hint">Mini Mart box</div>
            </div>
            <div class="meta">
              Продукт #${index + 1}<br>
              Категория: ${escapeHtml(product.category)}
            </div>
            <div class="actions">
              <button class="mini-btn dark" data-add="${escapeHtml(product.title)}">Добави в количката</button>
            </div>
          </div>
        `;

        frag.appendChild(card);
      });

      els.productGrid.appendChild(frag);

      document.querySelectorAll("[data-add]").forEach(btn => {
        btn.addEventListener("click", () => {
          addToCart(btn.getAttribute("data-add"));
        });
      });
    }

    els.searchInput.addEventListener("input", renderProducts);

    els.resetBtn.addEventListener("click", () => {
      els.searchInput.value = "";
      renderProducts();
    });

    els.clearCartBtn.addEventListener("click", clearCart);

    els.viewCartBtn.addEventListener("click", () => {
      const cart = getCart();

      if (!cart.length) {
        alert("Количката е празна.");
        return;
      }

      const text = cart.map(item => `• ${item.title} x${item.qty}`).join("\n");
      alert("Количка:\n\n" + text);
    });

    renderProducts();
    updateCartUI();
  </script>
</body>
</html>
