<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Mart Delivery</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f4f8f2;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --green:#8cc63f;
      --green-dark:#5e8f1d;
      --line:rgba(15,23,42,0.08);
      --shadow:0 18px 46px rgba(9,15,24,.08);
      --dark:#0b2230;
    }

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#fbfff8,#eef5e9);
      color:var(--text);
      font-family:Arial,sans-serif;
    }

    .page{
      max-width:1720px;
      margin:0 auto;
      padding:0 18px 24px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:60;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      margin:0 -18px 18px;
      padding:14px 18px;
      box-shadow:0 8px 24px rgba(0,0,0,.03);
    }

    .topbar-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      max-width:1720px;
      margin:0 auto;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .brand img{
      width:160px;
      max-width:100%;
      display:block;
    }

    .brand-copy h1{
      margin:0 0 4px;
      font-size:22px;
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .brand-copy p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .search{
      width:390px;
      max-width:100%;
      height:54px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:0 20px;
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .cart-btn{
      min-width:138px;
      height:54px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,var(--green),#78b727);
      color:#fff;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      padding:0 20px;
      box-shadow:0 14px 28px rgba(140,198,63,.22);
    }

    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin:12px 0 14px;
    }

    .pill{
      border:none;
      background:#fff;
      color:var(--text);
      height:54px;
      padding:0 22px;
      border-radius:999px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .pill.active{
      background:#07222a;
      color:#fff;
      border-color:#07222a;
    }

    .head-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:12px 0 16px;
      flex-wrap:wrap;
    }

    .head-row h2{
      margin:0;
      font-size:54px;
      line-height:.95;
      letter-spacing:-.05em;
    }

    .results{
      color:var(--muted);
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .image-wrap{
      aspect-ratio:1/1;
      overflow:hidden;
      background:#fff;
      position:relative;
    }

    .image-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#fff;
    }

    .badge{
      position:absolute;
      top:16px;
      left:16px;
      z-index:2;
      background:rgba(255,255,255,.93);
      color:#111;
      padding:10px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:900;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }

    .source-badge{
      position:absolute;
      top:16px;
      right:16px;
      z-index:2;
      background:rgba(7,34,42,.92);
      color:#fff;
      padding:8px 12px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .body{
      padding:20px 18px 18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .title{
      font-size:28px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .desc{
      color:#55687b;
      font-size:15px;
      line-height:1.5;
      min-height:44px;
    }

    .price{
      font-size:28px;
      font-weight:900;
      letter-spacing:-.03em;
      margin-top:6px;
    }

    .subprice{
      color:#55687b;
      font-size:13px;
      font-weight:800;
    }

    .meta-box{
      margin-top:2px;
      padding:14px 16px;
      background:#f7faf7;
      border:1px solid rgba(15,23,42,0.08);
      border-radius:18px;
      color:#55687b;
      font-size:13px;
      line-height:1.5;
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:auto;
      padding-top:4px;
      flex-wrap:wrap;
    }

    .mini-btn{
      flex:1;
      min-width:130px;
      height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
    }

    .mini-btn.dark{
      background:#081e2a;
      color:#fff;
      border-color:#081e2a;
    }

    .empty{
      display:none;
      padding:18px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      color:var(--muted);
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    @media (max-width:900px){
      .head-row h2{ font-size:42px; }
      .grid{ grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); }
    }

    @media (max-width:720px){
      .page{ padding:0 14px 20px; }
      .topbar{ margin:0 -14px 16px; padding:12px 14px; }
      .topbar-inner{ align-items:flex-start; }
      .search{ width:100%; }
      .top-actions{ width:100%; }
      .cart-btn{ width:100%; }
      .head-row h2{ font-size:34px; }
      .grid{ grid-template-columns:1fr; gap:16px; }
    }
  </style>
</head>

      "Нехранителни": 9
    };

    const els = {
      searchInput: document.getElementById("searchInput"),
      cartOpenBtn: document.getElementById("cartOpenBtn"),
      productGrid: document.getElementById("productGrid"),
      emptyState: document.getElementById("emptyState"),
      resultsText: document.getElementById("resultsText"),
      pills: [...document.querySelectorAll(".pill")]
    };

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem(CART_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateCartUi();
    }

    function addToCart(title) {
      const cart = getCart();
      const found = cart.find(x => x.title === title);

      if (found) {
        found.qty += 1;
      } else {
        cart.push({ title, qty: 1 });
      }

      saveCart(cart);
    }

    function clearCart() {
      localStorage.removeItem(CART_KEY);
      updateCartUi();
    }

    function updateCartUi() {
      const count = getCart().reduce((sum, item) => sum + item.qty, 0);
      els.cartOpenBtn.textContent = `Количка (${count})`;
    }

    function showCart() {
      const cart = getCart();

      if (!cart.length) {
        alert("Количката е празна.");
        return;
      }

      const text = cart.map(item => `• ${item.title} x${item.qty}`).join("\n");
      const shouldClear = confirm(`Количка:\n\n${text}\n\nOK = Изчисти количката\nCancel = Затвори`);
      if (shouldClear) clearCart();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function matchesProduct(product) {
      const q = els.searchInput.value.trim().toLowerCase();
      const filterOk = currentFilter === "all" || product.category === currentFilter;
      const text = `${product.title} ${product.category} ${product.desc}`.toLowerCase();
      const searchOk = !q || text.includes(q);
      return filterOk && searchOk;
    }

    function sortProducts(list) {
      if (currentFilter !== "all") return list;

      return [...list].sort((a, b) => {
        const priorityA = categoryPriority[a.category] || 999;
        const priorityB = categoryPriority[b.category] || 999;

        if (priorityA !== priorityB) return priorityA - priorityB;
        return a.title.localeCompare(b.title, "bg");
      });
    }

    function renderProducts() {
      const filtered = sortProducts(products.filter(matchesProduct));

      els.productGrid.innerHTML = "";
      els.resultsText.textContent = `Показани ${filtered.length} продукта`;
      els.emptyState.style.display = filtered.length ? "none" : "block";

      const frag = document.createDocumentFragment();

      filtered.forEach((product) => {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div class="image-wrap">
            <div class="badge">${escapeHtml(product.category)}</div>
            <div class="source-badge">${escapeHtml(product.source)}</div>
            <img src="${product.imageSrc}" alt="${escapeHtml(product.title)}" loading="lazy" style="object-position:${product.imagePos || "center"};">
          </div>
          <div class="body">
            <div class="title">${escapeHtml(product.title)}</div>
            <div class="desc">${escapeHtml(product.desc)}</div>
            <div class="price">${escapeHtml(product.priceLabel)}</div>
            <div class="subprice">публично потвърдена цена</div>
            <div class="meta-box">
              Източник: ${escapeHtml(product.source)}<br>
              При „Всички“ започва с хотдог.
            </div>
            <div class="actions">
              <button class="mini-btn dark">Добави в количката</button>
              <button class="mini-btn">Виж снимка</button>
            </div>
          </div>
        `;

        const img = card.querySelector("img");
        const addBtn = card.querySelectorAll(".mini-btn")[0];
        const viewBtn = card.querySelectorAll(".mini-btn")[1];

        img.addEventListener("error", () => {
          img.src = svgFallback(product.title);
          img.style.objectPosition = "center";
        });

        addBtn.addEventListener("click", () => addToCart(product.title));
        viewBtn.addEventListener("click", () => window.open(product.imageSrc, "_blank"));

        frag.appendChild(card);
      });

      els.productGrid.appendChild(frag);
    }

    els.searchInput.addEventListener("input", renderProducts);
    els.cartOpenBtn.addEventListener("click", showCart);

    els.pills.forEach(btn => {
      btn.addEventListener("click", () => {
        els.pills.forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderProducts();
      });
    });

    renderProducts();
    updateCartUi();
  </script>
</body>
</html>
